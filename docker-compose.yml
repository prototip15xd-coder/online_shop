services:
  web: #или nginx
    image: nginx
    ports:
      - 82:80
    volumes:
      - ./:mdr11/projects/online_shop/docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf //?
      - ./:var/www/html

git
  php-fpm:
    build: ./docker/php
    volumes:
      - './:var/www/html'
      - ./docker/php/Xdebug.ini:/usr/local/etc/php/conf.d/docker-php-xdebug.ini


  postgres:
    image: postgres:16
    volumes:
      - ./docker/postgres/data
    environment:
      - POSTGRES_USER=USER # {$DB_USER}
      - POSTGRES_PASSWORD=PASS #{$DB_PASSWORD}
      - POSTGRES_DB=mydb #{$DB}
    ports:
      - 5434:5432